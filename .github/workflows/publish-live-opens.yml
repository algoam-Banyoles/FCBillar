name: Publish live opens

# Bolca l'estat EN VIU dels Opens en curs (totes les modalitats) a Supabase
# (taula fcbillar.open_live), perquè l'app web en mostri el seguiment en temps
# real. Només llegeix pàgines públiques de la federació (sense login) i escriu a
# Supabase amb la service_role.
#
# REQUISIT: secrets al repo (Settings → Secrets and variables → Actions):
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#
# CADÈNCIA: es llança CADA HORA (minut 0). Els crons poc freqüents SÍ que els
# respecta GitHub (a diferència d'un `*/15`, que estrangularia). Cada execució fa
# un BUCLE INTERN que verifica els resultats penjats per la federació cada ~2 min
# durant ~70 min; així, dins de cada hora, les dades s'actualitzen cada pocs minuts.
# El buffer (70 min > 60) i cancel-in-progress cobreixen els retards del cron.
#
# Finestra: DISSABTES i DIUMENGES, 8:00–22:00 hora local (06–20 UTC a l'estiu,
# CEST=UTC+2; a l'hivern CET=UTC+1 caldria '0 7-21 * * 6,0'). Dies: 6=ds, 0=dg.

on:
  schedule:
    - cron: '0 6-20 * * 6,0'
  workflow_dispatch: {}

# Un nou tret reinicia el bucle des de zero (sempre dades fresques, sense pila).
concurrency:
  group: publish-live-opens
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Publish live opens (bucle intern ~2 min durant ~70 min)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          END=$(( SECONDS + 4200 ))   # ~70 min: cobreix l'hora + buffer per retards del cron
          i=0
          while [ "$SECONDS" -lt "$END" ]; do
            i=$(( i + 1 ))
            echo "::group::publicació #$i (t=${SECONDS}s)"
            uv run --no-dev fcbillar publish-live-opens || true
            echo "::endgroup::"
            [ "$SECONDS" -lt "$END" ] && sleep 120
          done
