name: Publish live opens

# Bolca l'estat EN VIU dels Opens en curs (totes les modalitats) a Supabase
# (taula fcbillar.open_live), perquè l'app web en mostri el seguiment en temps
# real. Només llegeix pàgines públiques de la federació (sense login) i escriu a
# Supabase amb la service_role.
#
# REQUISIT: afegir aquests secrets al repo (Settings → Secrets and variables →
# Actions → New repository secret):
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#
# CADÈNCIA: divendres, dissabte i diumenge, de 9:00 a 22:00 hora local, cada 30
# min. ATENCIÓ: el cron de GitHub Actions va en UTC i NO aplica horari d'estiu.
#   - Estiu (CEST = UTC+2, ~final març–final octubre): 9–22 local = 07–20 UTC.
#   - Hivern (CET = UTC+1): caldria sumar 1 h → '*/30 8-21 * * 5,6,0'.
# Dies de la setmana: 5=dv, 6=ds, 0=dg.

on:
  schedule:
    - cron: '*/30 7-20 * * 5,6,0'
  workflow_dispatch: {}

# No solapis execucions: si una triga, la següent espera (no s'encavalquen).
concurrency:
  group: publish-live-opens
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Publish live opens to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run --no-dev fcbillar publish-live-opens
